name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  macos:
    name: macOS (arm64)
    runs-on: macos-latest

    steps:
      - name: Resolve release channel
        id: channel
        run: |
          if [[ "${GITHUB_REF_NAME}" == *"-nightly."* ]]; then
            echo "is_nightly=true" >> "$GITHUB_OUTPUT"
            echo "release_name=Nightly ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "is_nightly=false" >> "$GITHUB_OUTPUT"
            echo "release_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS artifacts (unsigned)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: pnpm build:mac

      - name: Rename nightly artifacts
        if: steps.channel.outputs.is_nightly == 'true'
        run: |
          for file in dist/*.dmg dist/*.zip; do
            extension="${file##*.}"
            base="${file%.*}"
            mv "$file" "${base}-${GITHUB_REF_NAME}.${extension}"
          done

      - name: Generate checksums
        run: shasum -a 256 dist/*.dmg dist/*.zip > dist/SHA256SUMS.txt

      - name: Publish nightly prerelease
        if: steps.channel.outputs.is_nightly == 'true'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: ${{ steps.channel.outputs.release_name }}
          prerelease: true
          make_latest: false
          generate_release_notes: true
          files: |
            dist/*.dmg
            dist/*.zip
            dist/SHA256SUMS.txt

      - name: Publish stable release
        if: steps.channel.outputs.is_nightly != 'true'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: ${{ steps.channel.outputs.release_name }}
          prerelease: false
          make_latest: true
          generate_release_notes: true
          files: |
            dist/*.dmg
            dist/*.zip
            dist/SHA256SUMS.txt
